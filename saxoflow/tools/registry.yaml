# saxoflow/tools/registry.yaml
#
# Tool registry: maps native EDA tool commands to their SaxoFlow wrapper and
# describes how to detect whether the SaxoFlow wrapper is available at runtime.
#
# Schema per entry
# ----------------
# key:          Unique string identifier for this tool (snake_case)
# native:       The bare native command that a non-SaxoFlow user would run
# saxoflow_cmd: The equivalent `saxoflow` CLI sub-command / alias
# check_cmd:    Shell command whose exit code == 0 means the tool is installed
# description:  One-line human-readable description
#
# Usage in code: command_map.py reads this file and builds a lookup dict.
# The TeachSession step runner uses the lookup to decide which command to
# actually execute (native vs. saxoflow wrapper) per CommandDef settings.

tools:
  - key: iverilog
    native: "iverilog"
    saxoflow_cmd: "saxoflow sim iverilog"
    check_cmd: "iverilog -V"
    description: "Icarus Verilog RTL simulator"

  - key: vvp
    native: "vvp"
    saxoflow_cmd: "saxoflow sim vvp"
    check_cmd: "vvp -V"
    description: "Icarus Verilog simulation runner"

  - key: gtkwave
    native: "gtkwave"
    saxoflow_cmd: "saxoflow wave gtkwave"
    check_cmd: "gtkwave --version"
    description: "GTKWave waveform viewer"

  - key: verilator
    native: "verilator"
    saxoflow_cmd: "saxoflow sim verilator"
    check_cmd: "verilator --version"
    description: "Verilator Verilog/SystemVerilog simulator"

  - key: yosys
    native: "yosys"
    saxoflow_cmd: "saxoflow synth yosys"
    check_cmd: "yosys --version"
    description: "Yosys open synthesis suite"

  - key: openroad
    native: "openroad"
    saxoflow_cmd: "saxoflow pnr openroad"
    check_cmd: "openroad -version"
    description: "OpenROAD open-source PnR flow"

  - key: nextpnr
    native: "nextpnr-ecp5"
    saxoflow_cmd: "saxoflow pnr nextpnr"
    check_cmd: "nextpnr-ecp5 --version"
    description: "nextpnr open-source FPGA place-and-route"

  - key: symbiyosys
    native: "sby"
    saxoflow_cmd: "saxoflow formal sby"
    check_cmd: "sby --version"
    description: "SymbiYosys formal verification front-end"

  - key: vivado
    native: "vivado"
    saxoflow_cmd: "saxoflow synth vivado"
    check_cmd: "vivado -version"
    description: "Xilinx Vivado design suite"

  - key: make
    native: "make"
    saxoflow_cmd: "saxoflow make"
    check_cmd: "make --version"
    description: "GNU Make build system"

  - key: qemu_system_riscv64
    native: "qemu-system-riscv64"
    saxoflow_cmd: "saxoflow run qemu"
    check_cmd: "qemu-system-riscv64 --version"
    description: "QEMU RISC-V full-system emulator"

  - key: openocd
    native: "openocd"
    saxoflow_cmd: "saxoflow install openocd"
    check_cmd: "openocd --version"
    description: "OpenOCD JTAG/SWD debugger"

  - key: riscv_pk
    native: "pk"
    saxoflow_cmd: "saxoflow install riscv-pk"
    check_cmd: "pk --help"
    description: "RISC-V Proxy Kernel runtime loader"

  - key: surfer
    native: "surfer"
    saxoflow_cmd: "saxoflow install surfer"
    check_cmd: "surfer --version"
    description: "Modern waveform viewer"

  - key: edalize
    native: "el_docker"
    saxoflow_cmd: "saxoflow install edalize"
    check_cmd: "python3 -c 'import edalize'"
    description: "Edalize EDA tool-flow abstraction library"

  - key: nvc
    native: "nvc"
    saxoflow_cmd: "saxoflow install nvc"
    check_cmd: "nvc --version"
    description: "NVC VHDL compiler/simulator"

  - key: kactus2
    native: "kactus2"
    saxoflow_cmd: "saxoflow install kactus2"
    check_cmd: "kactus2 --version"
    description: "Kactus2 IP-XACT design tool"

  - key: siliconcompiler
    native: "sc"
    saxoflow_cmd: "saxoflow install siliconcompiler"
    check_cmd: "python3 -c 'import siliconcompiler'"
    description: "SiliconCompiler project orchestration framework"

  - key: renode
    native: "renode"
    saxoflow_cmd: "saxoflow install renode"
    check_cmd: "renode --version"
    description: "Renode virtual platform"

  - key: gem5
    native: "gem5"
    saxoflow_cmd: "saxoflow install gem5"
    check_cmd: "gem5 --version"
    description: "gem5 architecture simulator"

  - key: riscv_vp_plusplus
    native: "riscv-vp-plusplus"
    saxoflow_cmd: "saxoflow install riscv-vp-plusplus"
    check_cmd: "riscv-vp-plusplus --version"
    description: "RISC-V VP++ virtual platform"

  - key: openram
    native: "openram"
    saxoflow_cmd: "saxoflow install openram"
    check_cmd: "openram -h"
    description: "OpenRAM SRAM compiler"
