# saxoflow/tools/license_metadata.yaml
#
# License and redistribution metadata for every tool registered in registry.yaml.
#
# Schema per entry (under tool_licenses.<key>):
#   license:           SPDX identifier (e.g. "ISC", "Apache-2.0", "GPL-3.0-or-later")
#   redistribution:    One of: allowed | allowed-with-attribution | restricted | unknown
#   upstream_url:      Canonical project homepage or repository URL
#   license_summary:   Short human-readable redistribution note (required for education_ready)
#   education_ready:   true if this tool is included in packaged lab bundles (default: false)
#
# Redistribution values:
#   allowed                  – open-source or public-domain; free to redistribute
#   allowed-with-attribution – redistributable subject to copyright notice preservation
#   restricted               – binary-only or commercial; must not redistribute without permission
#   unknown                  – upstream license unclear; must be reviewed before packaging

