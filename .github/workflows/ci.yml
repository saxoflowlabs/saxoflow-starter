name: SaxoFlow CI — Python Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v1-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            pip-v1-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install package and test dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest flake8 coverage questionary rich

      - name: Lint — fail on syntax/name errors
        run: |
          flake8 saxoflow/ saxoflow_agenticai/ cool_cli/ \
            --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — report style warnings (non-blocking)
        run: |
          flake8 saxoflow/ saxoflow_agenticai/ cool_cli/ \
            --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests/ \
            --count --exit-zero --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests with coverage
        run: |
          coverage run -m pytest tests/ --tb=short -v --maxfail=5 | tee test-output.log
          coverage report -m
          coverage report --fail-under=85
          coverage xml

      - name: Upload logs and coverage on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-py${{ matrix.python-version }}
          path: |
            test-output.log
            coverage.xml
            .coverage
