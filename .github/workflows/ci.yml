name: SaxoFlow CI — Python Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v1-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            pip-v1-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install package and test dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov flake8 coverage questionary rich

      - name: Lint — fail on syntax/name errors
        run: |
          flake8 saxoflow/ saxoflow_agenticai/ cool_cli/ \
            --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — report style warnings (non-blocking)
        run: |
          flake8 saxoflow/ saxoflow_agenticai/ cool_cli/ \
            --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests/ \
            --count --exit-zero --select=E9,F63,F7,F82 --show-source --statistics

      - name: Stage 1 — Command parity contract check (M1)
        run: |
          python scripts/check_command_parity.py

      - name: Stage 1 — Documentation manifest lint (M7)
        run: |
          python scripts/ci/check_doc_manifest.py

      - name: Stage 1 — Adapter license metadata lint (M7)
        run: |
          python scripts/ci/check_adapter_license_metadata.py

      - name: Stage 1 — Deprecation contract check (M7)
        run: |
          python scripts/ci/check_deprecation_contracts.py

      - name: Stage 2 — Workspace schema and migration tests (M2)
        run: |
          python -m pytest \
            tests/test_saxoflow/test_workspace_schema.py \
            tests/test_saxoflow/test_workspace_lockfiles.py \
            tests/test_saxoflow/test_workspace_validate.py \
            tests/test_saxoflow/test_workspace_migrate.py \
            tests/test_saxoflow/test_workspace_migration_matrix.py \
            --cov=saxoflow.workspace.schema \
            --cov=saxoflow.workspace.lockfiles \
            --cov=saxoflow.workspace.validate \
            --cov=saxoflow.workspace.migrate \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Stage 3 — Workspace lifecycle integration tests (M2)
        run: |
          python -m pytest \
            tests/test_saxoflow/test_workspace_cli.py \
            tests/test_saxoflow/test_workspace_behavior_equivalence.py

      - name: Stage 2 — TutorialSpec compiler tests (M5)
        run: |
          python -m pytest \
            tests/teach/test_tutorialspec_compiler.py \
            --cov=saxoflow.teach.tutorialspec \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Stage 3 — Teach lifecycle and migration tests (M5)
        run: |
          python -m pytest \
            tests/teach/test_pack_migration.py \
            tests/test_saxoflow/test_teach/test_teach_cli.py \
            tests/test_saxoflow/test_teach/test_tui_bridge.py

      - name: Stage 4 — Tutorial compile performance tests (M5)
        run: |
          python -m pytest \
            tests/teach/test_tutorialspec_performance.py

      - name: Run tests with coverage
        run: |
          coverage run -m pytest tests/ --tb=short -v --maxfail=5 | tee test-output.log
          coverage report -m
          coverage report --fail-under=85
          coverage xml

      - name: Generate migration report artifact
        if: always()
        run: |
          mkdir -p migration-reports
          python - <<'EOF'
          import json, datetime
          from saxoflow.command_registry import get_legacy_alias_hints, get_canonical_commands
          alias_hints = get_legacy_alias_hints()
          canonical = get_canonical_commands()
          report = {
              "generated_at": datetime.datetime.utcnow().isoformat() + "Z",
              "python_version": "${{ matrix.python-version }}",
              "total_legacy_aliases": len(alias_hints),
              "total_canonical_commands": len(canonical),
              "alias_transition_map": alias_hints,
          }
          with open("migration-reports/transition_report_py${{ matrix.python-version }}.json", "w") as fh:
              json.dump(report, fh, indent=2)
          print(f"Transition report: {len(alias_hints)} legacy aliases")
          EOF

      - name: Upload migration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-report-py${{ matrix.python-version }}
          path: migration-reports/
          retention-days: 30

      - name: Upload logs and coverage on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-py${{ matrix.python-version }}
          path: |
            test-output.log
            coverage.xml
            .coverage
          if-no-files-found: ignore
