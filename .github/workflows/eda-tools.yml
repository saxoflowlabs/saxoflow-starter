name: SaxoFlow EDA Tools Build

# Only runs when recipe scripts change — not on every push.
on:
  push:
    paths:
      - "scripts/recipes/**"
      - "saxoflow/**"
      - "tests/test_saxoflow/test_makeflow.py"
      - "formal/**"
  pull_request:
    paths:
      - "scripts/recipes/**"
      - "saxoflow/**"
      - "tests/test_saxoflow/test_makeflow.py"
      - "formal/**"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-eda-tools:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      # ── Free up ~14 GB of pre-installed CI bloat ──────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost
          sudo apt-get clean
          df -h

      # ── Swap: give ABC linker room to breathe ─────────────────────────────
      - name: Add 8 GB swap
        run: |
          set -euxo pipefail
          SWAPFILE=/mnt/saxoflow.swap
          sudo fallocate -l 8G "$SWAPFILE"
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h

      # ── Per-tool caches (each well under 10 GB limit) ────────────────────
      - name: Restore Yosys cache
        id: cache-yosys
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/yosys
          key: yosys-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/yosys.sh') }}

      - name: Restore Verilator cache
        id: cache-verilator
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/verilator
          key: verilator-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/verilator.sh') }}

      - name: Restore cocotb cache
        id: cache-cocotb
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/cocotb
          key: cocotb-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/cocotb.sh') }}

      - name: Restore FuseSoC cache
        id: cache-fusesoc
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/fusesoc
          key: fusesoc-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/fusesoc.sh') }}

      - name: Restore SymbiYosys cache
        id: cache-sby
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/sby
          key: sby-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/symbiyosys.sh') }}

      - name: Restore nextpnr cache
        id: cache-nextpnr
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/nextpnr
          key: nextpnr-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/nextpnr.sh') }}

      - name: Restore Surelog cache
        id: cache-surelog
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/surelog
          key: surelog-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/surelog.sh') }}

      - name: Restore OpenROAD cache
        id: cache-openroad
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/openroad
          key: openroad-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/openroad.sh') }}

      - name: Restore OpenSTA cache
        id: cache-opensta
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/opensta
          key: opensta-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/opensta.sh') }}

      - name: Restore Bender cache
        id: cache-bender
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/bender
          key: bender-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/bender.sh') }}

      - name: Restore sv2v cache
        id: cache-sv2v
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/sv2v
          key: sv2v-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/sv2v.sh') }}

      - name: Restore RgGen cache
        id: cache-rggen
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/rggen
          key: rggen-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/rggen.sh') }}

      - name: Restore Covered cache
        id: cache-covered
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/covered
          key: covered-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/covered.sh') }}

      - name: Restore Spike cache
        id: cache-spike
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/spike
          key: spike-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/spike.sh') }}

      - name: Restore RISC-V toolchain cache
        id: cache-riscv-toolchain
        uses: actions/cache/restore@v4
        with:
          path: ~/.local/riscv-toolchain
          key: riscv-toolchain-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/riscv-toolchain.sh') }}

      # ── System deps — APT-managed tools + build prerequisites ─────────────
      - name: Install system dependencies and APT-managed tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            make git python3 python3-pip \
            python3-venv \
            cmake g++ gcc flex bison \
            libreadline-dev tcl-dev libffi-dev libboost-all-dev \
            zlib1g zlib1g-dev \
            ghdl iverilog gtkwave \
            klayout magic netgen openfpgaloader \
            z3 boolector \
            libfl-dev \
            device-tree-compiler libboost-regex-dev libboost-system-dev \
            unzip autoconf automake libtool gperf
          pip3 install --quiet packaging click

      # ── Build script-managed tools (skip if cached) ───────────────────────
      - name: Build Yosys
        id: build-yosys
        if: steps.cache-yosys.outputs.cache-hit != 'true'
        run: bash scripts/recipes/yosys.sh

      - name: Save Yosys cache
        if: steps.cache-yosys.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/yosys
          key: yosys-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/yosys.sh') }}

      - name: Build Verilator
        id: build-verilator
        if: steps.cache-verilator.outputs.cache-hit != 'true'
        run: bash scripts/recipes/verilator.sh

      - name: Save Verilator cache
        if: steps.cache-verilator.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/verilator
          key: verilator-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/verilator.sh') }}

      - name: Build cocotb
        id: build-cocotb
        if: steps.cache-cocotb.outputs.cache-hit != 'true'
        run: bash scripts/recipes/cocotb.sh

      - name: Save cocotb cache
        if: steps.cache-cocotb.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/cocotb
          key: cocotb-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/cocotb.sh') }}

      - name: Build FuseSoC
        id: build-fusesoc
        if: steps.cache-fusesoc.outputs.cache-hit != 'true'
        run: bash scripts/recipes/fusesoc.sh

      - name: Save FuseSoC cache
        if: steps.cache-fusesoc.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/fusesoc
          key: fusesoc-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/fusesoc.sh') }}

      - name: Build SymbiYosys
        id: build-sby
        if: steps.cache-sby.outputs.cache-hit != 'true'
        run: |
          export PATH="$HOME/.local/yosys/bin:$PATH"
          bash scripts/recipes/symbiyosys.sh

      - name: Save SymbiYosys cache
        if: steps.cache-sby.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/sby
          key: sby-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/symbiyosys.sh') }}

      - name: Build nextpnr
        id: build-nextpnr
        if: steps.cache-nextpnr.outputs.cache-hit != 'true'
        run: bash scripts/recipes/nextpnr.sh

      - name: Save nextpnr cache
        if: steps.cache-nextpnr.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/nextpnr
          key: nextpnr-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/nextpnr.sh') }}

      - name: Build Surelog
        id: build-surelog
        if: steps.cache-surelog.outputs.cache-hit != 'true'
        run: bash scripts/recipes/surelog.sh

      - name: Save Surelog cache
        if: steps.cache-surelog.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/surelog
          key: surelog-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/surelog.sh') }}

      - name: Build OpenROAD
        id: build-openroad
        if: steps.cache-openroad.outputs.cache-hit != 'true'
        run: bash scripts/recipes/openroad.sh

      - name: Save OpenROAD cache
        if: steps.cache-openroad.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/openroad
          key: openroad-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/openroad.sh') }}

      - name: Build OpenSTA
        id: build-opensta
        if: steps.cache-opensta.outputs.cache-hit != 'true'
        run: bash scripts/recipes/opensta.sh

      - name: Save OpenSTA cache
        if: steps.cache-opensta.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/opensta
          key: opensta-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/opensta.sh') }}

      - name: Build Bender
        id: build-bender
        if: steps.cache-bender.outputs.cache-hit != 'true'
        run: bash scripts/recipes/bender.sh

      - name: Save Bender cache
        if: steps.cache-bender.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/bender
          key: bender-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/bender.sh') }}

      - name: Build sv2v
        id: build-sv2v
        if: steps.cache-sv2v.outputs.cache-hit != 'true'
        run: bash scripts/recipes/sv2v.sh

      - name: Save sv2v cache
        if: steps.cache-sv2v.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/sv2v
          key: sv2v-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/sv2v.sh') }}

      - name: Build RgGen
        id: build-rggen
        if: steps.cache-rggen.outputs.cache-hit != 'true'
        run: bash scripts/recipes/rggen.sh

      - name: Save RgGen cache
        if: steps.cache-rggen.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/rggen
          key: rggen-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/rggen.sh') }}

      - name: Build Covered
        id: build-covered
        if: steps.cache-covered.outputs.cache-hit != 'true'
        run: bash scripts/recipes/covered.sh

      - name: Save Covered cache
        if: steps.cache-covered.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/covered
          key: covered-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/covered.sh') }}

      - name: Build Spike
        id: build-spike
        if: steps.cache-spike.outputs.cache-hit != 'true'
        run: bash scripts/recipes/spike.sh

      - name: Save Spike cache
        if: steps.cache-spike.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/spike
          key: spike-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/spike.sh') }}

      - name: Build RISC-V toolchain
        id: build-riscv-toolchain
        if: steps.cache-riscv-toolchain.outputs.cache-hit != 'true'
        run: bash scripts/recipes/riscv-toolchain.sh

      - name: Save RISC-V toolchain cache
        if: steps.cache-riscv-toolchain.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.local/riscv-toolchain
          key: riscv-toolchain-v1-${{ runner.os }}-${{ hashFiles('scripts/recipes/riscv-toolchain.sh') }}

      # ── Verify all tools: presence + version against MIN_TOOL_VERSIONS ────
      # Min versions from saxoflow/tools/definitions.py::MIN_TOOL_VERSIONS
      - name: Verify all EDA tool versions
        run: |
          # Single-line PATH — multi-line backslash continuation is unreliable
          # in GitHub Actions run: blocks; use a plain concatenation instead.
          export PATH="$HOME/.local/yosys/bin:$HOME/.local/verilator/bin:$HOME/.local/cocotb/bin:$HOME/.local/fusesoc/bin:$HOME/.local/sby/bin:$HOME/.local/nextpnr/bin:$HOME/.local/surelog/bin:$HOME/.local/openroad/bin:$HOME/.local/opensta/bin:$HOME/.local/bender/bin:$HOME/.local/sv2v/bin:$HOME/.local/rggen/bin:$HOME/.local/covered/bin:$HOME/.local/spike/bin:$HOME/.local/riscv-toolchain/bin:$HOME/.local/bin:$PATH"

          FAIL=0

          check_tool() {
            local name="$1"
            local cmd="$2"
            local min="$3"   # minimum version string (empty = presence-only)
            echo ""
            echo "── $name ──"
            if ! command -v "$name" &>/dev/null; then
              echo "  MISSING: $name not found in PATH"
              FAIL=1
              return
            fi
            local ver
            ver=$(eval "$cmd" 2>&1 | head -1 || true)
            echo "  $ver"
            if [ -n "$min" ]; then
              # semver-style: compare first numeric token
              local got; got=$(echo "$ver" | grep -oP '\d+\.\d+[\.\d]*' | head -1)
              if [ -z "$got" ]; then
                echo "  WARN: could not parse version from output (presence confirmed)"
              else
                if python3 -c "
          import sys
          from packaging.version import Version
          got = '$got'; min = '$min'
          if Version(got) < Version(min):
              print(f'  FAIL: {got} < required {min}')
              sys.exit(1)
          else:
              print(f'  OK: {got} >= {min}')
          " 2>/dev/null; then
                  : # python check passed
                else
                  FAIL=1
                fi
              fi
            fi
          }

          # APT-managed tools
          # gtkwave and klayout require a display; check presence only
          check_tool "ghdl"            "ghdl --version"            "2.0"
          check_tool "iverilog"        "iverilog -V"               "10.3"
          check_tool "vvp"             "vvp -V"                    ""
          check_tool "gtkwave"         "gtkwave --version"         ""
          check_tool "klayout"         "klayout -v"                ""
          check_tool "magic"           "magic --version"           "8.3"
          check_tool "netgen"          "netgen --version"          "1.5.192"
          check_tool "openfpgaloader"  "openfpgaloader --version"  ""
          check_tool "z3"              "z3 --version"             "4.8"
          check_tool "boolector"       "boolector --version"      "1.0"

          # Script-managed tools
          # openroad uses a non-semver date-stamp version; check presence only
          check_tool "yosys"           "yosys --version"           "0.27"
          check_tool "verilator"       "verilator --version"       "5.0"
          check_tool "cocotb-config"   "cocotb-config --version"   "1.8"
          check_tool "fusesoc"         "fusesoc --version"         "2.4"
          check_tool "sby"             "sby --version"             "1.0"
          check_tool "surelog"         "surelog --version"         ""
          check_tool "nextpnr-ecp5"    "nextpnr-ecp5 --version"    "0.2"
          check_tool "nextpnr-ice40"   "nextpnr-ice40 --version"   "0.2"
          check_tool "nextpnr-nexus"   "nextpnr-nexus --version"   ""
          check_tool "openroad"        "openroad -version"         ""
          check_tool "sta"             "sta -version"              ""
          check_tool "bender"          "bender --version"          ""
          check_tool "make"            "make --version"            ""

          # Second-batch tools
          check_tool "sv2v"                    "sv2v --version"               "2023.1"
          check_tool "rggen"                   "rggen --version"              "0.36"
          check_tool "covered"                 "covered -v"                  "0.9"
          check_tool "spike"                   "spike --help"                ""
          check_tool "riscv64-unknown-elf-gcc" "riscv64-unknown-elf-gcc --version" ""

          echo ""
          df -h
          echo ""
          if [ "$FAIL" -ne 0 ]; then
            echo "One or more tool checks FAILED."
            exit 1
          fi
          echo "All tool checks passed."

      # ── Minimal deterministic formal smoke benchmark + reproducibility manifest ──
      - name: Run formal smoke benchmark
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/yosys/bin:$HOME/.local/sby/bin:$HOME/.local/bin:$PATH"

          mkdir -p formal-smoke artifacts/formal-smoke

          cat > formal-smoke/smoke.sv <<'EOF'
          module smoke(
            input wire clk,
            input wire rst_n,
            input wire en
          );
            reg [3:0] cnt;

            always @(posedge clk) begin
              if (!rst_n)
                cnt <= 4'd0;
              else if (en)
                cnt <= cnt + 4'd1;
            end

            always @(*) begin
              if (rst_n)
                assert(cnt <= 4'd15);
            end
          endmodule
          EOF

          cat > formal-smoke/smoke.sby <<'EOF'
          [tasks]
          prove

          [options]
          prove: mode bmc
          prove: depth 20

          [engines]
          prove: smtbmc z3

          [script]
          read -formal smoke.sv
          prep -top smoke

          [files]
          smoke.sv
          EOF

          pushd formal-smoke >/dev/null
          /usr/bin/time -f "elapsed_sec=%e\nmax_rss_kb=%M" -o ../artifacts/formal-smoke/metrics.txt \
            sby --prefix ../artifacts/formal-smoke/smoke -f smoke.sby prove \
            | tee ../artifacts/formal-smoke/sby.log
          popd >/dev/null

      - name: Generate formal run manifest
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import platform
          import subprocess
          from pathlib import Path

          metrics_path = Path("artifacts/formal-smoke/metrics.txt")
          metrics = {"elapsed_sec": None, "max_rss_kb": None}
          if metrics_path.exists():
              for line in metrics_path.read_text(encoding="utf-8").splitlines():
                  if "=" in line:
                      k, v = line.split("=", 1)
                      metrics[k.strip()] = v.strip()

          def cmd_out(cmd):
              try:
                  return subprocess.check_output(cmd, stderr=subprocess.STDOUT, text=True).splitlines()[0]
              except Exception:
                  return "unknown"

          dirty = "unknown"
          try:
              subprocess.check_call(["git", "diff", "--quiet"])
              subprocess.check_call(["git", "diff", "--cached", "--quiet"])
              dirty = False
          except subprocess.CalledProcessError:
              dirty = True

          manifest = {
              "benchmark": "formal-smoke",
              "selected_engine": "smtbmc",
              "selected_solver": "z3",
              "solver_version": cmd_out(["z3", "--version"]),
              "sby_version": cmd_out(["sby", "--version"]),
              "sby_task": "prove",
              "sby_options": {
                  "mode": "bmc",
                  "depth": 20,
                  "autotune": False,
                  "timeout_sec": None,
              },
              "timing": {
                  "elapsed_sec": metrics.get("elapsed_sec"),
              },
              "memory": {
                  "peak_rss_kb": metrics.get("max_rss_kb"),
              },
              "host": {
                  "platform": platform.platform(),
                  "machine": platform.machine(),
                  "python": platform.python_version(),
              },
              "toolchain": {
                  "yosys": cmd_out(["yosys", "--version"]),
                  "z3": cmd_out(["z3", "--version"]),
                  "boolector": cmd_out(["boolector", "--version"]),
              },
              "git": {
                  "commit_sha": os.getenv("GITHUB_SHA", "unknown"),
                  "dirty_tree": dirty,
              },
              "ci": {
                  "event": os.getenv("GITHUB_EVENT_NAME", "unknown"),
                  "ref": os.getenv("GITHUB_REF_NAME", "unknown"),
              },
          }

          out_path = Path("artifacts/formal-smoke/run-manifest.json")
          out_path.write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          print(f"Wrote {out_path}")
          PY

      - name: Upload formal smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-smoke-artifacts
          path: artifacts/formal-smoke/
