id: openroad_navigation
title: "Navigating OpenROAD & the Physical Design Environment"
goal: >
  Launch OpenROAD, load the Croc design, and navigate the GUI to
  understand the physical design database: layers, cells, nets, and
  the standard cell rows.
read:
  - doc: "ex01.pdf"
    section: "All sections"
commands:
  - native: "openroad -version"
  - native: "cd croc && make floorplan GUI=1 || make floorplan"
agent_invocations: []
success:
  - kind: exit_code_0
  - kind: stdout_contains
    pattern: "OpenROAD|openroad|floorplan"
hints:
  - "In the OpenROAD GUI: View → Layer Visibility to show/hide metal layers."
  - "Use Inspect → Net to find any net and highlight its path."
  - "The Croc design has a 200 MHz target clock — find it in timing constraints."
  - "Try 'help' in the OpenROAD Tcl shell to see available commands."
