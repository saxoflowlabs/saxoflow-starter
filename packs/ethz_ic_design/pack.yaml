# ----------------------------------------------------------------------
# Lessons — one YAML per lab exercise (open-source tools only).
# Skipped: Ex2 (block diagrams/no commands), Ex12 (ATPG/proprietary),
#          Ex13 (presentations/no commands).
# ----------------------------------------------------------------------
lessons:
  - "01_environment_croc_setup.yaml"
  - "02_simulation_verilator.yaml"        # Ex1 Part 1: adder8 warm-up (Tasks 1-4)
  - "02b_croc_soc_simulation.yaml"        # Ex1 Part 2: Croc SoC simulation (Tasks 5-6)
  - "03_rtl_croc_exploration.yaml"
  - "04_synthesis_yosys.yaml"
