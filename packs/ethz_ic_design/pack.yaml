# packs/ethz_ic_design/pack.yaml
# Teaching pack: ETH Zurich VLSI2 — Open-Source IC Design
# -------------------------------------------------------
# All PDFs live in docs/.  After placing them, run:
#   saxoflow teach index ethz_ic_design
# Then start:
#   saxoflow teach start ethz_ic_design

id: ethz_ic_design
name: "ETH Zurich VLSI2 — Open-Source IC Design"
version: "2.0"
authors:
  - "ETH Zurich — Integrated Systems Laboratory (IIS)"
  - "Luca Benini, Frank K. Gürkaynak"
description: >
  Full open-source IC design flow following the ETH Zurich VLSI2 course.
  Students work with the Croc RISC-V SoC through simulation (Verilator),
  logic synthesis (Yosys), physical design (OpenROAD), and sign-off
  (KLayout).  Each lesson maps directly to a published VLSI exercise PDF.
  All tools are open-source; no proprietary licences required.

# ----------------------------------------------------------------------
# Documents indexed by the BM25 retriever.
# The LLM uses these to ground explanations and hints.
# Add or remove files here without changing any other code.
# ----------------------------------------------------------------------
docs:
  # Lecture slides — reference documents (BM25 Q&A context only, not shown chunk-by-chunk)
  - filename: "01_Intro.pdf"
    type: pdf
    role: reference
  - filename: "02_RTL.pdf"
    type: pdf
    role: reference
  - filename: "03_Netlist.pdf"
    type: pdf
    role: reference
