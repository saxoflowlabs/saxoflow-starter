id: asic_backend
title: "ASIC Backend: Place, Route & GDS with OpenROAD"
goal: >
  Take your synthesised gate-level netlist through the full ASIC physical
  design flow using OpenROAD: floorplan, power delivery network, placement,
  clock tree synthesis, routing and finally GDS export via KLayout.
  Verify your design is DRC-clean before sign-off.
read:
  - doc: ethz_ic_tutorial.pdf
    section: "8. ASIC Backend Flow"

commands:
  - native: "openroad -exit scripts/floorplan.tcl"
    preferred: null
    use_preferred_if_available: false
  - native: "openroad -exit scripts/pdn.tcl"
    preferred: null
    use_preferred_if_available: false
  - native: "openroad -exit scripts/place.tcl"
    preferred: null
    use_preferred_if_available: false
  - native: "openroad -exit scripts/cts.tcl"
    preferred: null
    use_preferred_if_available: false
  - native: "openroad -exit scripts/route.tcl"
    preferred: null
    use_preferred_if_available: false
  - native: "openroad -exit scripts/gds.tcl"
    preferred: null
    use_preferred_if_available: false
  - native: "klayout -b -r drc/run_drc.rb -rd input=gds/design.gds"
    preferred: "saxoflow drc"
    use_preferred_if_available: false

agent_invocations: []

success:
  - kind: file_exists
    file: "gds/design.gds"
  - kind: file_exists
    file: "reports/drc_clean.rpt"

hints:
  - "If 'openroad not found': install from https://github.com/The-OpenROAD-Project/OpenROAD"
  - "If floorplan fails: check that your PDK path is set correctly in config/pdk.tcl"
  - "If routing completes with violations: enable ECO mode in scripts/route.tcl"
  - "If DRC fails: review the violation report in reports/drc_violations.rpt"
  - "If klayout not found: install via 'sudo apt install klayout' or from klayout.de"
  - "If GDS file is empty: ensure gds/ directory exists before running gds.tcl"

notes: >
  This is the final step of the ETH Zurich IC Design pack.  All previous
  steps (RTL, simulation, synthesis) must be complete before starting.
  OpenROAD scripts reference the PDK configured in config/pdk.tcl — copy
  the template from tutorial appendix B and update the PDK path for your
  system.  saxoflow pnr and saxoflow drc wrappers are marked 'planned' in
  the registry; use native OpenROAD and KLayout commands until those
  wrappers are implemented.
