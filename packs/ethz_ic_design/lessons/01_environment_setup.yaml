# packs/ethz_ic_design/lessons/01_environment_setup.yaml
# Step 1: Environment and tool verification

id: env_setup
title: "Environment Setup & Tool Verification"
goal: >
  Verify that all required EDA tools (Icarus Verilog, GTKWave, Yosys)
  are installed and accessible, and that the SaxoFlow project structure
  is correctly initialized.

# Reference to document sections students should read first.
read:
  - doc: "ethz_ic_tutorial.pdf"
    section: "1. Introduction"
    pages: "1-5"
  - doc: "ethz_ic_tutorial.pdf"
    section: "2. Tool Installation"
    pages: "6-10"

commands:
  - native: "iverilog -V"
    preferred: "saxoflow diagnose --tool iverilog"
    use_preferred_if_available: true
  - native: "yosys --version"
    preferred: "saxoflow diagnose --tool yosys"
    use_preferred_if_available: true

agent_invocations: []

success:
  - kind: exit_code_0
  - kind: stdout_contains
    pattern: "Icarus Verilog|iverilog"

hints:
  - "If iverilog is not found, run: saxoflow install iverilog"
  - "If yosys is not found, run: saxoflow install yosys"
  - "Run 'saxoflow diagnose' for a full tool health check."

notes: >
  Students should have SaxoFlow installed in a WSL2/Ubuntu environment.
  Windows native paths will not work for most EDA tools.
