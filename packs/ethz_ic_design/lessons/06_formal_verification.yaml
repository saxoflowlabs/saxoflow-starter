# packs/ethz_ic_design/lessons/06_formal_verification.yaml
# Step 6: Formal property verification with SymbiYosys

id: formal_verification
title: "Formal Property Verification with SymbiYosys"
goal: >
  Write formal properties for the counter (e.g., output never exceeds 15,
  reachability of all states) and prove them using SymbiYosys (sby).

read:
  - doc: "ethz_ic_tutorial.pdf"
    section: "7. Formal Verification"
    pages: "41-52"

commands:
  - native: "sby -f formal/counter.sby"
    preferred: "saxoflow formal"
    use_preferred_if_available: true

agent_invocations:
  - agent_key: fpropgen
    description: "Generate formal property file for the counter"
    args:
      spec: >
        Formal properties for 4-bit up counter:
        1) output q never exceeds 4'hF,
        2) after reset q == 0,
        3) with en=1, q increments by 1 each cycle
      rtl_file: "rtl/counter.v"
      output_file: "formal/counter_props.sv"

success:
  - kind: file_exists
    file: "formal/counter.sby"
  - kind: exit_code_0

hints:
  - "Create the formal/ directory first: mkdir -p formal"
  - "Type: agents  to generate the formal property file automatically."
  - >
    sby config format: [options] mode prove; [engines] smtbmc; [script] read -formal counter.sv
  - >
    If SymbiYosys is not installed, run: saxoflow install symbiyosys

notes: >
  SymbiYosys requires either Yosys + Z3 or Boolector as the backend solver.
  The saxoflow installer handles both.
