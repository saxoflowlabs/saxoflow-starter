# saxoflow_agenticai/config/model_config.yaml
default_provider: nvidia
default_model: auto
default_temperature: 0.3
default_max_tokens: 8192
default_timeout: 60
# enable_fallback_to_openrouter: true

autodetect_priority:
  - nvidia
  - openai
  - anthropic      # <— new
  - gemini         # <— new
  - groq
  - mistral
  - fireworks
  - together
  - perplexity
  - deepseek
  - dashscope
  - openrouter

agent_models:
  sim:
    provider: none
    model: none

providers:
  openai:
    model: gpt-5-nano
    temperature: 0.3
    max_tokens: 8192

  nvidia:
    model: glm-5.1
    timeout: 180
    max_retries: 1
    models:
      qwen-coder:
        model: qwen/qwen3-coder-480b-a35b-instruct
        temperature: 0.7
        top_p: 0.8
        max_tokens: 4096

      nemotron-super:
        model: nvidia/nemotron-3-super-120b-a12b
        temperature: 1
        top_p: 0.95
        max_tokens: 16384
        extra_body:
          chat_template_kwargs:
            enable_thinking: true
          reasoning_budget: 16384

      gpt-oss:
        model: openai/gpt-oss-120b
        temperature: 1
        top_p: 1
        max_tokens: 4096

      glm-5.1:
        model: z-ai/glm-5.1
        temperature: 1
        top_p: 1
        max_tokens: 16384

      deepseek-v4-flash:
        model: deepseek-ai/deepseek-v4-flash
        temperature: 1
        top_p: 0.95
        max_tokens: 16384
        timeout: 300
        max_retries: 0
        extra_body:
          chat_template_kwargs:
            thinking: true
            reasoning_effort: high

      deepseek-v4-pro:
        model: deepseek-ai/deepseek-v4-pro
        temperature: 1
        top_p: 0.95
        max_tokens: 16384
        timeout: 300
        max_retries: 0
        extra_body:
          chat_template_kwargs:
            thinking: false

      kimi-k2.6:
        model: moonshotai/kimi-k2.6
        temperature: 1
        top_p: 1
        max_tokens: 16384

      sarvam-m:
        model: sarvamai/sarvam-m
        temperature: 0.5
        top_p: 1
        max_tokens: 16384

  groq:
    model: openai/gpt-oss-120b
    temperature: 0.3
    max_tokens: 8192

  mistral:
    model: mistral-large-latest
    temperature: 0.3
    max_tokens: null     # <— avoid 422 (extra field)

  fireworks:
    model: accounts/fireworks/models/llama-v3p1-8b-instruct
    temperature: 0.3
    max_tokens: 8192

  together:
    model: mistralai/Mixtral-8x7B-Instruct-v0.1
    temperature: 0.3
    max_tokens: 8192

  perplexity:
    model: llama-3.1-sonar-large-128k-online
    temperature: 0.3
    max_tokens: 8192

  deepseek:
    model: deepseek-chat
    temperature: 0.3
    max_tokens: 8192

  dashscope:
    model: qwen2.5-7b-instruct
    temperature: 0.3
    max_tokens: null     # <— conservative like mistral

  openrouter:
    model: openai/gpt-oss-120b:free
    temperature: 0.3
    max_tokens: 8192

  # New native providers
  anthropic:
    model: claude-3-5-sonnet-latest
    temperature: 0.3
    max_tokens: 4096     # Anthropic often expects a value; 4k is a safe middle ground

  gemini:
    model: gemini-2.5-flash
    temperature: 0.3
    max_tokens: null     # let SDK choose (maps to max_output_tokens)
